<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love AI 💖</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* Chat box */
#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #ff2e63;
    margin-left: auto;
}

.bot {
    background: #1f1f1f;
    color: #00ffd5;
}

/* Input area */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

input {
    flex: 1;
    padding: 15px;
    font-size: 16px;
    border: none;
    outline: none;
}

button {
    padding: 15px;
    background: #ff2e63;
    color: white;
    border: none;
    cursor: pointer;
}

/* Fireworks canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="chat"></div>

<div id="inputArea">
    <input id="name" placeholder="Type a name... 💖">
    <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// 💖 AI style love reply
function generateLove(name) {
    let messages = [
        `My heart beats faster when I hear your name, ${name} 💖`,
        `You are not just special... you are my whole universe 🌌`,
        `If I could, I would pause time just to stay with you forever ⏳`,
        `Every star reminds me of your beautiful smile ✨`,
        `I don't know about the future, but I know I want you in it 💞`
    ];
    return messages[Math.floor(Math.random() * messages.length)];
}

// Send message
function send() {
    let input = document.getElementById("name");
    let name = input.value;
    if (!name) return;

    addMsg(name, "user");

    setTimeout(() => {
        addMsg(generateLove(name), "bot");
        explode(); // fireworks
    }, 800);

    input.value = "";
}

/* 🎇 FIREWORKS */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function explode() {
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            alpha: 1
        });
    }
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.02;

        ctx.fillStyle = `rgba(255,0,100,${p.alpha})`;
        ctx.fillRect(p.x, p.y, 3, 3);

        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
