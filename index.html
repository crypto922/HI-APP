<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Generator 💖</title>
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: black;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    h1 {
        margin-top: 50px;
        color: pink;
    }

    input {
        padding: 10px;
        font-size: 18px;
        border-radius: 10px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        background: red;
        color: white;
        cursor: pointer;
    }

    #message {
        margin-top: 40px;
        font-size: 22px;
        line-height: 1.8;
        min-height: 200px;
        white-space: pre-line;
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from { transform: translateY(100vh); opacity: 1; }
        to { transform: translateY(-10vh); opacity: 0; }
    }
</style>
</head>
<body>

<h1>💖 Love Generator 💖</h1>

<input id="name" type="text" placeholder="Enter a name">
<button onclick="generateLove()">Create Love</button>

<div id="message"></div>

<script>
function generateLove() {
    let name = document.getElementById("name").value;
    let msgBox = document.getElementById("message");

    let text = `
My Dear ${name},

From the moment I saw you,
my world became brighter.

You are the smile I never want to lose,
and the dream I always think about.

I may not be perfect,
but my feelings for you are real 💖

I just want to say...

I LOVE YOU, ${name} 💕
`;

    typeWriter(text, msgBox);
    createHearts();
}

// ✨ typing effect
function typeWriter(text, element) {
    element.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }
    typing();
}

// 💖 floating hearts
function createHearts() {
    for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }
}
</script>

</body>
</html>
